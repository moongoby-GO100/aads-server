version: '3.9'

# PostgreSQL: pgvector/pgvector:pg15 컨테이너 (T-011 Memory 인프라)
# 기존 호스트 PostgreSQL 9.6 (port 5432) → 5433으로 매핑해 공존
# aads-server는 aads-postgres 서비스로 연결 (DATABASE_URL 업데이트)

services:
  aads-postgres:
    image: pgvector/pgvector:pg15
    container_name: aads-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=aads
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=aads
    volumes:
      - aads_postgres_data:/var/lib/postgresql/data
      # 컨테이너 첫 시작 시 init_memory_schema.sql 자동 실행 (T-018)
      - ./scripts/init_memory_schema.sql:/docker-entrypoint-initdb.d/init_memory_schema.sql:ro
    networks:
      - aads_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aads -d aads"]
      interval: 10s
      timeout: 5s
      retries: 5

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: aads-socket-proxy
    restart: always
    environment:
      - CONTAINERS=1
      - EXEC=1
      - IMAGES=1
      - INFO=1
      - NETWORKS=0
      - VOLUMES=0
      - SWARM=0
      - SECRETS=0
      - POST=1
      - TZ=Asia/Seoul
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - aads_network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  aads-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aads-server
    restart: always
    ports:
      - "8100:8080"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - DOCKER_HOST=tcp://aads-socket-proxy:2375
      # aads-postgres 컨테이너 (pgvector/pg15) 연결 (T-011)
      - DATABASE_URL=postgresql://aads:${POSTGRES_PASSWORD}@aads-postgres:5432/aads
      # GitHub PAT (AADS-179): 미설정 시 infra-check severity=warning (critical 아님)
      - GITHUB_PAT=${GITHUB_PAT:-}
      # AADS-185: CEO Chat 전면 재설계 — 검색/리서치 API 키
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      # Naver / Kakao 검색 API
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID:-}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET:-}
      - KAKAO_REST_API_KEY=${KAKAO_REST_API_KEY:-}
      # LiteLLM 프록시 (AADS-185)
      - LITELLM_BASE_URL=${LITELLM_BASE_URL:-http://litellm:4000}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-litellm}
      # AADS-186C: Langfuse Observability (optional)
      - LANGFUSE_HOST=${LANGFUSE_HOST:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      # AADS-186C: Telegram 알림 봇 (optional)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      # AADS-186C: MCP 서버
      - MCP_ENABLED=${MCP_ENABLED:-true}
      # AADS-190: 프로젝트별 원격 DB 접속 (query_project_database)
      - KIS_DB_HOST=${KIS_DB_HOST:-}
      - KIS_DB_PORT=${KIS_DB_PORT:-5432}
      - KIS_DB_NAME=${KIS_DB_NAME:-}
      - KIS_DB_USER=${KIS_DB_USER:-}
      - KIS_DB_PASSWORD=${KIS_DB_PASSWORD:-}
      # GO100은 KIS와 동일 DB (별칭, 별도 환경변수 불필요)
      - SF_DB_HOST=${SF_DB_HOST:-}
      - SF_DB_PORT=${SF_DB_PORT:-3306}
      - SF_DB_NAME=${SF_DB_NAME:-}
      - SF_DB_USER=${SF_DB_USER:-}
      - SF_DB_PASSWORD=${SF_DB_PASSWORD:-}
      - SF_DB_TYPE=${SF_DB_TYPE:-mysql}
      - NTV2_DB_HOST=${NTV2_DB_HOST:-}
      - NTV2_DB_PORT=${NTV2_DB_PORT:-3307}
      - NTV2_DB_NAME=${NTV2_DB_NAME:-}
      - NTV2_DB_USER=${NTV2_DB_USER:-}
      - NTV2_DB_PASSWORD=${NTV2_DB_PASSWORD:-}
      - NTV2_DB_TYPE=${NTV2_DB_TYPE:-mysql}
    volumes:
      # ★ 소스 볼륨 마운트: 호스트 수정 → 컨테이너 즉시 반영 (docker cp 불필요)
      - /root/aads/aads-server/app:/app/app:rw
      - /root/aads/aads-server/mcp_servers:/app/mcp_servers:rw
      - /root/aads/aads-server/migrations:/app/migrations:rw
      - /root/aads/aads-server/scripts:/app/scripts:rw
      - /root/aads/aads-server/supervisord.conf:/app/supervisord.conf:ro
      # SSH 키 마운트: 211/114 서버 접근용 (H-04: ro로 변경 — known_hosts는 호스트에서 관리)
      - /root/.ssh:/root/.ssh:ro
      # 지시서/보고서 파일 접근 (T-090: directive content API)
      - /root/.genspark:/root/.genspark:ro
      - /root/project-docs:/root/project-docs:ro
      - /root/aads/aads-docs:/root/aads/aads-docs:rw
      # AADS-190: 내보내기 파일 공유 (nginx /exports/ 경로)
      - /var/www/aads_exports:/var/www/aads_exports:rw
      # 채팅 첨부파일 업로드 디렉토리
      - /root/aads/uploads/chat:/root/aads/uploads/chat:rw
      # 서버 소스코드 읽기 (read_file / code_explorer 도구용)
      - /root/aads/aads-server:/root/aads/aads-server:ro
      - /root/aads/aads-dashboard:/root/aads/aads-dashboard:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - aads_network
    depends_on:
      aads-postgres:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  aads-litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: aads-litellm
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - .env.litellm
    environment:
      - DISABLE_SCHEMA_UPDATE=true
      - DISABLE_SPEND_LOGS=true
      - TZ=Asia/Seoul
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    networks:
      aads_network:
        aliases:
          - litellm
    mem_limit: 1g
    depends_on:
      aads-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  aads_postgres_data:

networks:
  aads_network:
    external: true
