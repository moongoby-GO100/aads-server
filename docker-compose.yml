version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aads-postgres
    restart: always
    environment:
      POSTGRES_DB: aads
      POSTGRES_USER: aads
      POSTGRES_PASSWORD: aads_dev_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - aads_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aads"]
      interval: 5s
      timeout: 3s
      retries: 5

  aads-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aads-server
    restart: always
    ports:
      - "8100:8080"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      # host.docker.internal → 호스트 PostgreSQL (9.6) 연결
      - DATABASE_URL=postgresql://aads:aads_dev_local@host.docker.internal:5432/aads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - aads_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  aads_network:
    external: true

volumes:
  pgdata:

