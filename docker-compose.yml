version: '3.9'

# PostgreSQL: 호스트 PostgreSQL 9.6 사용 (port 5432 충돌 방지)
# host.docker.internal → 172.17.0.1 (host-gateway) → 호스트 postgres
# iptables: 172.17.0.0/16 + 172.18.0.0/16 → 5432 ACCEPT 필수

services:
  aads-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aads-server
    restart: always
    ports:
      - "8100:8080"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      # host.docker.internal → 호스트 PostgreSQL (9.6) 연결
      - DATABASE_URL=postgresql://aads:aads_dev_local@host.docker.internal:5432/aads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - aads_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  aads_network:
    external: true

