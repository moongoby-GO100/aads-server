router_settings:
  enable_pre_call_checks: false
  num_retries: 3
  # AADS-234: 크로스 프로바이더 폴백 — Claude Sonnet/Opus 제거, Haiku + 외부 모델만
  model_group_fallbacks:
  - claude-haiku-4-5:
    - qwen3-coder-flash
    - gemini-2.5-flash-lite
    - dashscope-deepseek-v3.2
  - claude-haiku:
    - qwen3-coder-flash
    - gemini-2.5-flash-lite
    - dashscope-deepseek-v3.2
  - qwen-max:
    - qwen-plus
    - qwen-turbo
  - qwen-plus:
    - qwen-max
    - qwen-turbo
  - qwen3-coder-plus:
    - qwen3-coder-flash
    - gemini-2.5-flash
    - deepseek-chat
  - gemini-3.1-pro-preview:
    - gemini-2.5-pro
    - qwen3-coder-plus
    - deepseek-chat
  - deepseek-chat:
    - qwen3-coder-plus
    - gemini-2.5-flash
litellm_settings:
  drop_params: true
  set_verbose: true
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: false
  disable_spend_logs: true
