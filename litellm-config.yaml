# Gmail(order=1) 우선, Naver 리밋/장애 시 order=2로 폴백
router_settings:
  enable_pre_call_checks: true
  num_retries: 3

litellm_settings:
  drop_params: true
  set_verbose: true
  # max_budget: 10.0  # 일 $10 상한 — 임시 비활성화 (AADS 차단 원인 의심)
  # budget_duration: 1d

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: false
  disable_spend_logs: true
