# AADS Blue-Green upstream 설정
# 적용 위치: /etc/nginx/conf.d/aads-upstream.conf

upstream aads_api {
    zone aads_api 64k;
    least_conn;
    server 127.0.0.1:8100 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8102 max_fails=3 fail_timeout=30s backup;
    keepalive 32;
}

upstream aads_api_pc_agent_ws {
    zone aads_api_pc_agent_ws 64k;
    least_conn;
    server 127.0.0.1:8100 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8102 max_fails=3 fail_timeout=30s backup;
    keepalive 32;
}

upstream aads_dashboard {
    zone aads_dashboard 64k;
    least_conn;
    server 127.0.0.1:3100 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:3101 max_fails=3 fail_timeout=30s backup;
    keepalive 16;
}
