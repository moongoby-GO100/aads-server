plugins {
    id "com.android.application"
}

android {
    namespace "kr.newtalk.aads.agent"
    compileSdk 35

    defaultConfig {
        applicationId "kr.newtalk.aads.agent"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "0.1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation "com.squareup.okhttp3:okhttp:4.12.0"
}
