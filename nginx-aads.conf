# AADS Nginx Config — T-032 프로덕션 강화
# 적용 위치: /etc/nginx/conf.d/aads.conf
# 적용 방법: cp /root/aads/aads-server/nginx-aads.conf /etc/nginx/conf.d/aads.conf && nginx -t && systemctl reload nginx

limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

server {
    listen 80;
    server_name aads.newtalk.kr;

    # gzip 압축
    gzip on;
    gzip_types application/json text/html text/css application/javascript;
    gzip_min_length 1000;

    # 프로젝트 프리뷰 (동적 설정: deployer가 aads-previews/*.conf 생성)
    include /etc/nginx/conf.d/aads-previews/*.conf;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # T-044: Conversations API (standalone server at port 8101)
    location /api/v1/conversations {
        proxy_pass http://127.0.0.1:8101/api/v1/conversations;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 3s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_timeout 10s;
        proxy_next_upstream_tries 2;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # T-044: Memory API (standalone server at port 18085)
    location /api/v1/memory {
        proxy_pass http://127.0.0.1:18085/api/v1/memory;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 3s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_timeout 10s;
        proxy_next_upstream_tries 2;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # PC Agent WebSocket (wss:// upgrade 필수)
    location /api/v1/pc-agent/ws/ {
        proxy_pass http://127.0.0.1:8102/api/v1/pc-agent/ws/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # AADS Server API (W2-004: Docker Compose, port 8100)
    location /api/v1/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://127.0.0.1:8102/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 3s;
        # 무중단 배포: 502/503 시 자동 재시도 (code/reload 모드 보호)
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_timeout 5s;
        proxy_next_upstream_tries 2;
        # SSE support
        proxy_buffering off;
        gzip off;  # SSE 스트리밍 청크 버퍼링 방지
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        keepalive_timeout 600;
        add_header Cache-Control "no-store, no-cache, must-revalidate";

        # 보안 헤더
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Access-Control-Allow-Origin https://aads.newtalk.kr;
    }

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 3s;
    }

    # Dashboard
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTPS
