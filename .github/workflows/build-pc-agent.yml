name: Build PC Agent EXE

on:
  push:
    branches: [main]
    paths:
      - 'pc_agent/**'
  workflow_dispatch:

jobs:
  build-exe:
    name: Build Windows EXE
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pc_agent/requirements.txt

      - name: Build EXE with PyInstaller
        env:
          PYTHONIOENCODING: utf-8
        run: |
          cd pc_agent
          python build_exe.py

      - name: Read version
        id: version
        run: |
          $ver = Get-Content pc_agent/VERSION -Raw
          echo "version=$($ver.Trim())" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kakaobot-setup-${{ steps.version.outputs.version }}
          path: pc_agent/dist/kakaobot-setup.exe
          retention-days: 90

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pc-agent-v${{ steps.version.outputs.version }}
          name: "PC Agent v${{ steps.version.outputs.version }}"
          body: "KakaoBot PC Agent EXE (자동 빌드)"
          files: pc_agent/dist/kakaobot-setup.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
