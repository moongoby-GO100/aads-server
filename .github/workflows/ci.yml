name: AADS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Unit Tests + Tool Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      ANTHROPIC_AUTH_TOKEN: dummy_oauth_token_for_ci
      ANTHROPIC_API_KEY: dummy_anthropic_key_for_ci
      OPENAI_API_KEY: dummy_openai_key_for_ci
      GOOGLE_API_KEY: dummy_google_key_for_ci
      E2B_API_KEY: PLACEHOLDER_E2B_API_KEY
      SUPABASE_DIRECT_URL: postgresql://postgres:dummy@localhost:5432/aads
      UPSTASH_REDIS_URL: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Tool consistency check (no --fix)
        run: |
          python scripts/check_tool_consistency.py
        continue-on-error: false

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short --timeout=60
        continue-on-error: false

      - name: Run E2E pipeline tests (optional)
        run: |
          pytest tests/e2e/test_real_pipeline.py -v --tb=short --timeout=30
        continue-on-error: true

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - name: Ruff critical checks (undefined names)
        run: ruff check app/ --select F821,F811 --no-fix
        continue-on-error: false
      - name: Ruff full (advisory)
        run: ruff check app/ tests/ --ignore E501,F401
        continue-on-error: true
