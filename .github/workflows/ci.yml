name: AADS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Unit Tests (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # 더미 값 — 실제 키 없이 단위 테스트 실행 (Anthropic은 OAuth 변수명)
      ANTHROPIC_AUTH_TOKEN: dummy_oauth_token_for_ci
      ANTHROPIC_API_KEY: dummy_anthropic_key_for_ci
      OPENAI_API_KEY: dummy_openai_key_for_ci
      GOOGLE_API_KEY: dummy_google_key_for_ci
      E2B_API_KEY: PLACEHOLDER_E2B_API_KEY
      SUPABASE_DIRECT_URL: postgresql://postgres:dummy@localhost:5432/aads
      UPSTASH_REDIS_URL: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short --timeout=60
        continue-on-error: false

      - name: Run E2E pipeline tests (E2B SKIP)
        run: |
          pytest tests/e2e/test_real_pipeline.py -v --tb=short --timeout=30
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: .pytest_cache/

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check app/ tests/ --ignore E501,F401
        continue-on-error: true
